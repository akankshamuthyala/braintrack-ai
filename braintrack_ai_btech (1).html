<script>
var exams=[];
var mockQs=[];

function showTab(t){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  event.target.classList.add('active');
}

function addExam(){
  var s=document.getElementById('exam-subject').value;
  var d=document.getElementById('exam-date').value;
  var diff=document.getElementById('exam-diff').value;
  if(!s||!d){alert('Select a subject and date');return;}
  exams.push({subject:s,date:d,diff:diff});
  renderExams();
}

function renderExams(){
  var el=document.getElementById('exam-list');
  el.innerHTML='';
  exams.forEach(function(e,i){
    var days=Math.ceil((new Date(e.date)-new Date())/(86400000));
    el.innerHTML+='<div class="exam-item"><div><strong>'+e.subject+'</strong><br><span style="font-size:12px;color:var(--color-text-secondary)">'+e.date+' · '+e.diff+'</span></div><div style="display:flex;align-items:center;gap:8px"><span class="chip" style="background:var(--color-background-warning);color:var(--color-text-warning)">'+days+'d left</span><button class="btn" style="padding:2px 8px;font-size:12px" onclick="exams.splice('+i+',1);renderExams()">x</button></div></div>';
  });
}

async function callClaude(prompt){
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    var d=await r.json();
    if(d.content&&d.content[0])return d.content[0].text;
    return null;
  }catch(e){return null;}
}

function setResult(id,text){
  var el=document.getElementById(id);
  el.style.display='block';
  el.textContent=text;
}

function setLoading(id){
  var el=document.getElementById(id);
  el.style.display='block';
  el.innerHTML='<span class="spin">⟳</span> Generating...';
}

async function genStudyPlan(){
  if(exams.length===0){alert('Add at least one exam first');return;}
  setLoading('exam-result');
  var list=exams.map(function(e){return e.subject+' on '+e.date+' ('+e.diff+')'}).join(', ');
  var fallback='Here is a personalized study plan:\n\n';
  exams.forEach(function(e){
    var days=Math.ceil((new Date(e.date)-new Date())/(86400000));
    fallback+='📚 '+e.subject+' ('+days+' days left)\n';
    if(days<=3) fallback+='• Day 1: Quick revision of all key topics\n• Day 2: Practice previous year questions\n• Day 3: Formula sheet & mock test\n\n';
    else if(days<=7) fallback+='• Days 1-2: Core concepts & theory\n• Days 3-4: Numerical problems & coding\n• Days 5-6: Previous papers\n• Day 7: Revision & rest\n\n';
    else fallback+='• Week 1: Read notes & understand concepts\n• Week 2: Solve exercises\n• Week 3: Previous year papers\n• Final days: Revision & mock tests\n\n';
  });
  var prompt='Create a detailed day-by-day BTech exam study plan for these exams: '+list+'. Include specific topics, revision strategy, and tips. Keep it concise and practical.';
  var res=await callClaude(prompt);
  setResult('exam-result', res||fallback);
}

async function genWellness(){
  setLoading('health-result');
  var sleep=document.getElementById('sleep-val').value;
  var energy=document.getElementById('energy-val').value;
  var exercise=document.getElementById('exercise-val').value;
  var stress=document.getElementById('stress-val').value;
  var fallback='Based on your health data:\n\n';
  if(parseFloat(sleep)<6) fallback+='• You need more sleep! Aim for 7-8 hours.\n';
  if(parseInt(energy)<4) fallback+='• Low energy detected. Take short breaks every 45 mins.\n';
  if(exercise==='None') fallback+='• Try a 20-min walk today to boost focus.\n';
  if(stress.includes('High')||stress.includes('anxious')) fallback+='• Practice 4-7-8 breathing: inhale 4s, hold 7s, exhale 8s.\n';
  fallback+='\nStay consistent and take care of yourself!';
  var prompt='I am a BTech student. Sleep: '+sleep+' hours, energy: '+energy+'/10, exercise: '+exercise+', stress: '+stress+'. Give me personalized wellness advice to improve focus and manage exam stress. Keep it practical and motivating.';
  var res=await callClaude(prompt);
  setResult('health-result', res||fallback);
}

  'sa':['sad','same','save','scared'],

  'ca':['can','cannot','calm','care'],
  'mo':['motivated','more','morning','mood'],

  'he':['help','heavy','here','helped'],

function onDiaryInput(text){

function updateMood(text){
  var t=text.toLowerCase();
  var bar=document.getElementById('mood-bar');
  var label=document.getElementById('mood-label');
  
  var negPhrases=['not feeling good','not good','not well','not happy','dont feel','don\'t feel','not okay','not ok','feeling down','not great','not fine','lost my','no motivation','can\'t focus','cannot focus','don\'t want','dont want','nothing matters','what\'s the point','whats the point','no point'];
  var isNegPhrase=negPhrases.some(function(p){return t.includes(p);});
  
  var scores={
    stressed:0,anxious:0,lonely:0,sad:0,dull:0,happy:0,motivated:0,neutral:0,angry:0
  };
  
  if(isNegPhrase){
    scores.sad+=3;scores.dull+=2;
  }
  
  var patterns=[
    {words:['stressed','stress','pressure','overwhelm','too much','so much work'],key:'stressed',w:2},
    {words:['anxious','anxiety','nervous','panic','scared','fear','afraid','worry','worried'],key:'anxious',w:2},
    {words:['lonely','alone','isolated','no one','nobody','no friends','miss everyone'],key:'lonely',w:2},
    {words:['sad','unhappy','cry','crying','tears','heartbroken','depressed','hopeless','helpless'],key:'sad',w:2},
    {words:['dull','bored','boring','tired','exhausted','sleepy','fatigue','low energy','unmotivated','demotivated','no energy'],key:'dull',w:2},
    {words:['angry','frustrated','irritated','annoyed','mad','furious','hate this'],key:'angry',w:2},
    {words:['happy','excited','great','wonderful','amazing','love','enjoy','fantastic'],key:'happy',w:2},
    {words:['motivated','focused','confident','proud','achieved','accomplished','ready','productive'],key:'motivated',w:2}
  ];
  
  patterns.forEach(function(p){
    p.words.forEach(function(word){
      if(t.includes(word)) scores[p.key]+=p.w;
    });
  });
  
  var topMood='neutral';var topScore=0;
  Object.keys(scores).forEach(function(k){if(scores[k]>topScore){topScore=scores[k];topMood=k;}});
  
  var moodMap={
    stressed:{label:'Stressed',color:'#E24B4A',bg:'#FCEBEB',pct:75},
    anxious:{label:'Anxious',color:'#BA7517',bg:'#FAEEDA',pct:70},
    lonely:{label:'Lonely',color:'#533AB7',bg:'#EEEDFE',pct:60},
    sad:{label:'Sad',color:'#378ADD',bg:'#E6F1FB',pct:55},
    dull:{label:'Dull / Low energy',color:'#888780',bg:'#F1EFE8',pct:45},
    angry:{label:'Frustrated',color:'#D85A30',bg:'#FAECE7',pct:80},
    happy:{label:'Happy',color:'#3B6D11',bg:'#EAF3DE',pct:85},
    motivated:{label:'Motivated',color:'#0F6E56',bg:'#E1F5EE',pct:95},
    neutral:{label:'Neutral',color:'#5F5E5A',bg:'#F1EFE8',pct:50}
  };
  
  var m=moodMap[topMood]||moodMap.neutral;
  bar.style.width=m.pct+'%';
  bar.style.background=m.color;
  label.textContent='Mood: '+m.label;
  label.style.color=m.color;
  bar.dataset.mood=topMood;
}

function updatePredictions(text){
  var wrap=document.getElementById('predict-wrap');
  wrap.innerHTML='';
  var words=text.split(/\s+/);
  var last=words[words.length-1]||'';
  if(last.length<2){return;}
  var key=last.slice(0,2).toLowerCase();
  var suggestions=predictWords[key]||[];
  suggestions=suggestions.filter(function(w){return w.toLowerCase().startsWith(last.toLowerCase())&&w.toLowerCase()!==last.toLowerCase();});
  suggestions.slice(0,5).forEach(function(w){
    var btn=document.createElement('button');
    btn.className='predict-btn';
    btn.textContent=w;
    btn.onclick=function(){
      var ta=document.getElementById('diary-text');
      var parts=ta.value.split(/\s+/);
      parts[parts.length-1]=w;
      ta.value=parts.join(' ')+' ';
      onDiaryInput(ta.value);
      ta.focus();
    };
    wrap.appendChild(btn);
  });
}

    anxious:'The student feels anxious. Be very reassuring, warm and help them calm down with actionable steps.',
    lonely:'The student feels lonely. Be warm and compassionate. Remind them they are not alone and suggest ways to connect.',
    sad:'The student is sad. Be gentle, empathetic and motivating. Do not dismiss their feelings.',
    dull:'The student feels dull and unmotivated. Be energizing and give practical motivation tricks for BTech students.',
    angry:'The student is frustrated. Acknowledge their feelings first, then give calming and constructive advice.',
    happy:'The student is happy. Be enthusiastic, encouraging and help them channel this positivity into studies.',
    motivated:'The student is motivated. Celebrate their energy and give tips to maintain this productive mindset.',
    neutral:'The student shared a neutral diary entry. Be warm, reflective and thoughtful.'
  };
  
  var tone=toneInstruction[mood]||toneInstruction.neutral;
  var prompt='BTech student diary entry: "'+text+'". Detected mood: '+mood+'. '+tone+' Write a short personal AI reflection (3-5 sentences) directly addressing the student. Do not be generic.';
  var res=await callClaude(prompt);
  setResult('diary-result', res||fallbackMap[mood]||fallbackMap.neutral);
}

function clearDiary(){
  document.getElementById('diary-text').value='';
  document.getElementById('diary-result').style.display='none';
  document.getElementById('mood-bar').style.width='50%';
  document.getElementById('mood-label').textContent='Mood: neutral';
  document.getElementById('predict-wrap').innerHTML='';
}

async function genChecklist(){
  var s=document.getElementById('check-subject').value;
  if(!s){alert('Select a subject');return;}
  var el=document.getElementById('checklist-result');
  el.style.display='block';
  el.innerHTML='<div style="padding:8px;color:var(--color-text-secondary)"><span class="spin">⟳</span> Generating checklist...</div>';
  
  var fallbackTopics={
    'Data Structures & Algorithms':['Arrays & Strings','Linked Lists','Stacks & Queues','Trees & BST','Graphs','Sorting algorithms','Searching algorithms','Dynamic Programming','Greedy algorithms','Hashing'],
    'Operating Systems':['Process management','CPU scheduling','Memory management','Virtual memory','File systems','Deadlocks','Synchronization','I/O management','Disk scheduling','Security'],
    'Database Management Systems':['ER diagrams','Relational model','SQL queries','Joins & subqueries','Normalization','Transactions & ACID','Concurrency control','Indexing & B-trees','NoSQL basics','Query optimization'],
    'Computer Networks':['OSI model','TCP/IP model','IP addressing & subnetting','Routing protocols','Transport layer (TCP/UDP)','Application layer protocols','Network security','Wireless networks','DNS & DHCP','Socket programming'],
    'Machine Learning':['Supervised learning','Unsupervised learning','Linear regression','Classification algorithms','Decision trees','Neural networks basics','Model evaluation','Feature engineering','Overfitting & regularization','Clustering'],
  };
  
  var defaultTopics=['Introduction & basics','Core concepts','Important algorithms/methods','Problem solving','Previous year questions','Revision & practice tests'];
  var topics=fallbackTopics[s]||defaultTopics;
  
  var prompt='Create a BTech exam preparation checklist for '+s+'. List exactly 10 important topics to study, one per line, numbered 1-10. Keep each item concise (under 8 words).';
  var res=await callClaude(prompt);
  
  var items=[];
  if(res){
    items=res.split('\n').filter(function(l){return l.trim().length>2;}).map(function(l){return l.replace(/^\d+[\.\)]\s*/,'').trim();}).filter(function(l){return l.length>0;}).slice(0,10);
  }
  if(items.length<3) items=topics;
  
  el.innerHTML='<div style="font-size:13px;font-weight:500;margin-bottom:8px;color:var(--color-text-secondary)">'+s+' — study checklist</div>';
  items.forEach(function(item,i){
    el.innerHTML+='<div class="checklist-item"><input type="checkbox" id="chk'+i+'" onchange="updateProgress()"><label for="chk'+i+'" style="cursor:pointer;flex:1">'+item+'</label></div>';
  });
  el.innerHTML+='<div style="margin-top:10px;font-size:13px;color:var(--color-text-secondary)" id="progress-txt">0 / '+items.length+' completed</div>';
}

function updateProgress(){
  var total=document.querySelectorAll('#checklist-result input[type=checkbox]').length;
  var done=document.querySelectorAll('#checklist-result input[type=checkbox]:checked').length;
  var el=document.getElementById('progress-txt');
  if(el) el.textContent=done+' / '+total+' completed';
}

var mockData=[];

async function genMock(){
  var s=document.getElementById('mock-subject').value;
  if(!s){alert('Select a subject');return;}
  var qEl=document.getElementById('mock-questions');
  var rEl=document.getElementById('mock-result');
  qEl.style.display='block';
  rEl.style.display='none';
  qEl.innerHTML='<div class="card" style="color:var(--color-text-secondary)"><span class="spin">⟳</span> Generating 5 questions...</div>';
  
  var prompt='Create a BTech mock test for '+s+'. Give exactly 5 multiple choice questions. Format each question as:\nQ: [question]\nA) [option]\nB) [option]\nC) [option]\nD) [option]\nANS: [correct letter]\n\nSeparate questions with a blank line.';
  var res=await callClaude(prompt);
  
  mockData=[];
  if(res){
    var blocks=res.split(/\n\s*\n/).filter(function(b){return b.includes('Q:')&&b.includes('ANS:');});
    blocks.slice(0,5).forEach(function(b){
      var lines=b.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      var q=lines.find(function(l){return l.startsWith('Q:');});
      var opts=['A','B','C','D'].map(function(lt){return lines.find(function(l){return l.startsWith(lt+')');});}).filter(Boolean);
      var ans=lines.find(function(l){return l.startsWith('ANS:');});
      if(q&&opts.length>=2&&ans){
        mockData.push({q:q.replace('Q:','').trim(),opts:opts,ans:ans.replace('ANS:','').trim()});
      }
    });
  }
  
  if(mockData.length===0){
    mockData=[
      {q:'What is the time complexity of binary search?',opts:['A) O(n)','B) O(log n)','C) O(n²)','D) O(1)'],ans:'B'},
      {q:'Which data structure uses LIFO?',opts:['A) Queue','B) Heap','C) Stack','D) Array'],ans:'C'},
      {q:'What does CPU stand for?',opts:['A) Core Processing Unit','B) Central Program Unit','C) Central Processing Unit','D) Computing Processing Unit'],ans:'C'},
      {q:'Which layer handles routing in OSI?',opts:['A) Data Link','B) Transport','C) Session','D) Network'],ans:'D'},
      {q:'SQL stands for?',opts:['A) Structured Query Language','B) Simple Query Language','C) Structured Question Language','D) System Query Language'],ans:'A'}
    ];
  }
  
  qEl.innerHTML='<div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:12px">'+s+' — Mock Test</div>';
  mockData.forEach(function(q,i){
    qEl.innerHTML+='<div class="q-block"><p><strong>Q'+(i+1)+'.</strong> '+q.q+'</p>';
    q.opts.forEach(function(opt){
      var letter=opt[0];
      qEl.innerHTML+='<label style="display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;cursor:pointer"><input type="radio" name="q'+i+'" value="'+letter+'" style="width:14px;height:14px"> '+opt+'</label>';
    });
    qEl.innerHTML+='</div>';
  });
  qEl.innerHTML+='<button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="submitMock()">Submit & Check Score ↗</button></div>';
}

async function submitMock(){
  var correct=0;var feedback='';
  mockData.forEach(function(q,i){
    var sel=document.querySelector('input[name="q'+i+'"]:checked');
    var given=sel?sel.value:'—';
    var isRight=given===q.ans;
    if(isRight) correct++;
    feedback+='\nQ'+(i+1)+': '+(isRight?'Correct':'Wrong — Answer: '+q.ans);
  });
  var rEl=document.getElementById('mock-result');
  rEl.style.display='block';
  var pct=Math.round((correct/mockData.length)*100);
  var grade=pct>=80?'Excellent!':pct>=60?'Good — keep practicing!':pct>=40?'Needs improvement':'Revise your basics';
  rEl.innerHTML='<div class="card"><div class="score-box">'+correct+' / '+mockData.length+' correct ('+pct+'%)</div><div style="font-size:14px;font-weight:500;margin-bottom:8px">'+grade+'</div><div class="result-box" style="display:block;font-size:13px">'+feedback.trim()+'</div></div>';
  var subject=document.getElementById('mock-subject').value;
  var prompt='A BTech student scored '+correct+'/'+mockData.length+' in '+subject+'. Give brief feedback and 2-3 specific topics they should focus on. Keep it encouraging.';
  var aiRes=await callClaude(prompt);
  if(aiRes) rEl.querySelector('.result-box').textContent=feedback.trim()+'\n\n'+aiRes;
}
</script>
